name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Typecheck, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ruah-cli

      - uses: actions/checkout@v4
        with:
          repository: ruah-dev/ruah-orch
          path: ruah-orch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci
        working-directory: ruah-orch/packages/core

      - run: npm ci
        working-directory: ruah-cli

      - name: Typecheck
        run: npx tsc --noEmit
        working-directory: ruah-cli

      - name: Lint
        run: npx biome check .
        working-directory: ruah-cli

      - name: Build
        run: npm run build
        working-directory: ruah-cli

      - name: Test CLI
        run: |
          node dist/cli.js --version
          node dist/cli.js --help
          node dist/cli.js orch --version
        working-directory: ruah-cli

  publish-npm:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: ruah-cli

      - uses: actions/checkout@v4
        with:
          repository: ruah-dev/ruah-orch
          path: ruah-orch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci
        working-directory: ruah-orch/packages/core

      - run: npm ci
        working-directory: ruah-cli

      - name: Build
        run: npm run build
        working-directory: ruah-cli

      - name: Wait for orch core package to be visible
        run: |
          VERSION="$(node -p "require('../ruah-orch/packages/core/package.json').version")"
          for attempt in {1..20}; do
            if npm view "@ruah-dev/orch-core@$VERSION" version >/dev/null 2>&1; then
              exit 0
            fi
            sleep 15
          done
          echo "Timed out waiting for @ruah-dev/orch-core@$VERSION to be available on npm."
          exit 1
        working-directory: ruah-cli

      - name: Rewrite manifest for registry publish
        run: |
          ORCH_CORE_VERSION="$(node -p "require('../ruah-orch/packages/core/package.json').version")"
          ORCH_CORE_VERSION="$ORCH_CORE_VERSION" node <<'EOF'
          const fs = require("node:fs");
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));
          packageJson.dependencies["@ruah-dev/orch-core"] = `^${process.env.ORCH_CORE_VERSION}`;
          fs.writeFileSync("package.json", JSON.stringify(packageJson, null, "\t") + "\n");
          EOF
        working-directory: ruah-cli

      - name: Publish with provenance
        run: npm publish --access public --provenance
        working-directory: ruah-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: ruah-cli
          fetch-depth: 0

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "ruah CLI $TAG" \
            --generate-notes \
            --verify-tag
        working-directory: ruah-cli
